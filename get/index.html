<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Get Heqiyou</title>

  <!-- Open Graph (WhatsApp, Facebook, iMessage, LinkedIn, etc.) -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://heqiyou.com/get/">
  <meta property="og:title" content="Get Heqiyou">
  <meta property="og:description" content="Download Heqiyou for iOS and Android.">
  <meta property="og:image" content="https://heqiyou.com/logo.png">
  <meta property="og:image:width" content="573">
  <meta property="og:image:height" content="713">

  <!-- Twitter / X -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Get Heqiyou">
  <meta name="twitter:description" content="Download Heqiyou for iOS and Android.">
  <meta name="twitter:image" content="https://heqiyou.com/logo.png">
</head>
<body>
  <p>Redirecting you to download Heqiyou…</p>
  <script>
    var ua = navigator.userAgent || navigator.vendor || window.opera;

    var ios = /iPad|iPhone|iPod/.test(ua);
    var android = /android/i.test(ua);

    var APPLE = "https://apps.apple.com/app/id6779987367";
    var PLAY  = "https://play.google.com/store/apps/details?id=com.deployku.heqiyou";
    var FALLBACK = "https://heqiyou.com"; // desktop or anything else

    if (ios) {
      window.location.replace(APPLE);
    } else if (android) {
      window.location.replace(PLAY);
    } else {
      window.location.replace(FALLBACK);
    }
  </script>
</body>
</html>
